services:
  rl_router:
    environment:
      POLICY: "softmax"
      SOFTMAX_TAU: "${SOFTMAX_TAU:-0.1}"
      ALPHA_QUALITY: "2.5"
      BETA_LAT: "0.5"
      GAMMA_COST: "0.002"
      COSTS_PER_TOKEN: "0.5,1.0,0.7"
      ROUTER_JSONL: "/app/logs/route_log_softmax.jsonl"
    volumes:
      - ./checkpoints:/app/checkpoints:ro
      - ./logs:/app/logsI