services:
  rl_router:
    environment:
      POLICY: "thompson"
      TS_PRIOR_VAR: "${TS_PRIOR_VAR:-1.0}"
      ALPHA_QUALITY: "${ALPHA_QUALITY_OVERRIDE:-1.0}"
      BETA_LAT: "${BETA_LAT_OVERRIDE:-1.0}"
      GAMMA_COST: "${GAMMA_COST_OVERRIDE:-0.001}"
      COSTS_PER_TOKEN: "0.5,1.0,0.7"
      ROUTER_JSONL: "/app/logs/route_log_thompson.jsonl"
    volumes:
      - ./checkpoints:/app/checkpoints:ro
      - ./logs:/app/logs