version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
      - ./ollama/bootstrap.sh:/bootstrap.sh:ro
    environment:
      OLLAMA_MODELS: "mistral:7b-instruct,llama3:8b,codellama:7b-instruct"
    entrypoint: [ "/bin/sh","-lc","/bootstrap.sh" ]
    healthcheck:
      # Use the Ollama CLI (works with /bin/sh and verifies server is responsive)
      test: [ "CMD", "/bin/sh", "-lc", "/bin/ollama list >/dev/null 2>&1" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  mcp_a:
    build: ./mcp_ollama_adapter
    restart: unless-stopped
    environment:
      OLLAMA_BASE_URL: "http://ollama:11434"
      MODEL_NAME: "mistral:7b-instruct"
      NAME: "fast-cheap"
    ports:
      - "8000"
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 2s
      retries: 5

  mcp_b:
    build: ./mcp_ollama_adapter
    restart: unless-stopped
    environment:
      OLLAMA_BASE_URL: "http://ollama:11434"
      MODEL_NAME: "llama3:8b"
      NAME: "strong-general"
    ports:
      - "8000"
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 2s
      retries: 5

  mcp_c:
    build: ./mcp_ollama_adapter
    restart: unless-stopped
    environment:
      OLLAMA_BASE_URL: "http://ollama:11434"
      MODEL_NAME: "codellama:7b-instruct"
      NAME: "code-specialist"
    ports:
      - "8000"
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 2s
      retries: 5

  rl_router:
    build: ./router
    restart: unless-stopped
    depends_on:
      - mcp_a
      - mcp_b
      - mcp_c
    volumes:
      - ./checkpoints:/app/checkpoints:ro
      - ./logs:/app/logs
    environment:
      #POLICY: "ppo"
      POLICY: "epsilon"
      EPSILON: "0.15"
      METRICS_WINDOW: "50"
      BACKEND_TARGETS: "http://mcp_a:8000,http://mcp_b:8000,http://mcp_c:8000"
      N_HINT: "3"
      CHECKPOINT_PATH: "/app/checkpoints/ppo.pt"
      #SAVE_EVERY_UPDATES: "1"
      #UPDATE_EVERY: "256"
      # Changed from above to freeze training the model
      SAVE_EVERY_UPDATES: "0"
      UPDATE_EVERY: "100000000"
      ALPHA_QUALITY: "${ALPHA_QUALITY_OVERRIDE:-1.0}"
      BETA_LAT: "${BETA_LAT_OVERRIDE:-1.0}"
      GAMMA_COST: "${GAMMA_COST_OVERRIDE:-0.001}"
      COSTS_PER_TOKEN: "0.5,1.0,0.7"
      ROUTER_JSONL: "/app/logs/route_log_epsilon.jsonl"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 10s
      timeout: 2s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - rl_router
      - cadvisor
      - dcgm

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - "8089:8080"

  dcgm:
    image: nvidia/dcgm-exporter:latest
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    ports:
      - "9400:9400"

  grafana:
    image: grafana/grafana:11.2.0
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

  locust:
    image: locustio/locust:latest
    depends_on:
      - rl_router
    volumes:
      - ./locust:/mnt/locust
    command: ["-f", "/mnt/locust/locustfile.py", "--host", "http://rl_router:8080", "--headless", "-u", "50", "-r", "5", "-t", "5m"]
    ports:
      - "8081:8089"

  planner:
    build: ./planner
    restart: unless-stopped
    environment:
      ROUTER_URL: "http://rl_router:8080"
      STEP_TAGS: "code,explain,tests"
    depends_on:
      rl_router:
        condition: service_healthy
    ports:
      - "9000:9000"
    healthcheck:
      test: [ "CMD", "curl", "-sf", "http://localhost:9000/health" ]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  ollama_models:
