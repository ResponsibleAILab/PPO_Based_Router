# =============================
# File: prometheus/prometheus.yml
# =============================
global:
  scrape_interval: 2s

scrape_configs:
  - job_name: rl-router
    static_configs:
      - targets: ["rl_router:8080"]
  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
  - job_name: dcgm
    static_configs:
      - targets: ["dcgm:9400"]